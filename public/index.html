<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🀄 Mahjong Day</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:#fdf6f0;color:#3a2a1a;min-height:100vh}
  button{font-family:Georgia,serif;cursor:pointer}
  input{font-family:Georgia,serif}
  #landing{min-height:100vh;background:linear-gradient(160deg,#fff0f6 0%,#f5eeff 50%,#eef6ff 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px;text-align:center;position:relative;overflow:hidden}
  .blob{position:fixed;border-radius:50%;pointer-events:none}
  .b1{top:-80px;right:-80px;width:300px;height:300px;background:#ffd6e860}
  .b2{bottom:-100px;left:-80px;width:360px;height:360px;background:#e8d6ff60}
  .b3{top:40%;left:-60px;width:200px;height:200px;background:#d6f0e050}
  .landing-content{position:relative;z-index:1;max-width:460px;width:100%}
  .emoji-row{display:flex;justify-content:center;gap:10px;margin-bottom:36px;flex-wrap:wrap}
  .avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:2.5px solid}
  .stat-box{background:#fff;border:1.5px solid #f0dded;border-radius:12px;padding:12px 24px;margin-bottom:36px;display:inline-block;color:#b080a0;font-size:13px}
  .btn-primary{background:linear-gradient(135deg,#f4a0c4,#d060a0);border:none;border-radius:16px;color:#fff;font-weight:bold;font-size:18px;padding:18px 32px;width:100%;margin-bottom:14px;box-shadow:0 5px 18px #d07090aa;letter-spacing:.5px;transition:transform .15s}
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-secondary{background:linear-gradient(135deg,#ecdeff,#d4b8f8);border:1.5px solid #c0a0e8;border-radius:16px;color:#5a2080;font-weight:bold;font-size:18px;padding:18px 32px;width:100%;box-shadow:0 4px 14px #c0a0e030;letter-spacing:.5px;transition:transform .15s}
  .btn-secondary:hover{transform:translateY(-2px)}
  #navbar{background:linear-gradient(135deg,#ffe0f0,#f9e4ff);border-bottom:2px solid #f0b8d4;padding:0 1rem;display:none}
  .nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px}
  .nav-logo{background:none;border:none;cursor:pointer;text-align:left}
  .nav-title{font-size:22px;font-weight:bold;color:#c05080;letter-spacing:1px}
  .nav-sub{font-size:10px;color:#b080a0;letter-spacing:3px;text-transform:uppercase}
  .nav-tabs{display:flex;gap:8px}
  .nav-tab{padding:8px 16px;border-radius:20px;border:1.5px solid #ddb0c8;background:transparent;color:#c05080;font-weight:bold;font-size:12px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
  .nav-tab.active{border-color:#c05080;background:#f4d0e0;color:#8a1840}
  .page{display:none;max-width:900px;margin:0 auto;padding:24px 16px}
  .page.active{display:block}
  .date-row{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .date-label{color:#b080a0;font-size:11px;letter-spacing:2px;text-transform:uppercase}
  input[type=date]{background:#fff;border:1.5px solid #e0c0d0;border-radius:8px;color:#7a3050;padding:7px 12px;font-size:15px}
  .game-card{background:#fff;border:1.5px solid #f0dded;border-radius:14px;margin-bottom:18px;overflow:hidden;box-shadow:0 2px 12px #e8c8d818}
  .game-header{background:linear-gradient(90deg,#fdeef5,#f9eaff);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0dded}
  .game-title{color:#c05080;font-weight:bold;font-size:13px;letter-spacing:2px}
  .wall-toggle-row{display:flex;align-items:center;gap:12px}
  .toggle-wrap{display:flex;align-items:center;gap:6px;cursor:pointer}
  .toggle-track{width:36px;height:20px;border-radius:10px;background:#ddc0cc;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0}
  .toggle-track.on{background:#c05080}
  .toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px #00000030}
  .toggle-track.on .toggle-thumb{left:19px}
  .toggle-label{font-size:12px;color:#b090a8}
  .wall-banner{background:#fff8e8;border-bottom:1px dashed #e8d0a0;padding:8px 16px;font-size:12px;color:#9a7030;display:flex;align-items:center;gap:6px}
  .remove-btn{background:none;border:none;color:#e08080;font-size:18px;cursor:pointer}
  .players-grid{padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
  .player-card{border-radius:10px;padding:10px 10px 12px;border:1.5px solid}
  .player-name-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .player-name{font-weight:bold;font-size:13px}
  .player-input{width:100%;background:#fff;border:1px solid #e8d0dc;border-radius:6px;color:#3a2a1a;padding:6px 8px;font-size:14px;margin-bottom:7px}
  .hand-input{width:100%;background:#fff;border:1px solid #e8d0dc;border-radius:6px;padding:6px 8px;font-size:12px;font-style:italic}
  .add-game-btn{background:none;border:1.5px dashed #d0a0bc;border-radius:10px;color:#c06890;padding:11px 24px;font-size:14px;margin-bottom:24px;width:100%}
  .totals-box{background:#fff;border:1.5px solid #f0c8dc;border-radius:12px;padding:16px 20px;margin-bottom:20px}
  .totals-title{color:#c05080;font-weight:bold;font-size:13px;letter-spacing:2px;margin-bottom:12px}
  .totals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .total-item{display:flex;justify-content:space-between;align-items:center;border-radius:8px;padding:8px 12px}
  .save-row{display:flex;gap:12px;align-items:center}
  .save-btn{background:linear-gradient(135deg,#f0a0c0,#d070a0);border:none;border-radius:10px;color:#fff;font-weight:bold;font-size:15px;padding:13px 32px;flex:1;box-shadow:0 3px 10px #d07090aa;letter-spacing:1px}
  .save-msg{font-weight:bold;font-size:13px}
  .season-header{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start}
  .season-title{color:#c05080;font-size:20px;font-weight:bold;letter-spacing:1px}
  .season-sub{color:#b090a8;font-size:12px;margin-top:4px}
  .clear-btn{background:none;border:1px solid #e0a0a0;color:#c07070;border-radius:8px;padding:6px 14px;font-size:12px}
  .leaderboard{background:#fff;border:1.5px solid #f0dded;border-radius:14px;padding:18px 20px;margin-bottom:24px;box-shadow:0 2px 12px #f0d0e015}
  .section-label{color:#b080a0;font-size:11px;letter-spacing:2px;margin-bottom:14px;text-transform:uppercase}
  .lb-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .lb-rank{width:28px;font-size:16px;text-align:center}
  .lb-name{font-weight:bold;font-size:13px;width:80px}
  .lb-bar-wrap{flex:1;background:#f8eff4;border-radius:6px;height:20px;overflow:hidden}
  .lb-bar{height:100%;border-radius:6px;transition:width .6s ease}
  .lb-pts{width:52px;text-align:right;font-weight:bold;font-size:15px}
  .lb-wins{width:44px;text-align:right;color:#b0a0b0;font-size:11px}
  .hands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:28px}
  .hand-card{border-radius:12px;padding:14px 16px;border:1.5px solid}
  .hand-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .hand-card-stat{margin-left:auto;font-weight:bold;font-size:12px}
  .hand-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid}
  .hand-none{font-size:12px;font-style:italic}
  .history-card{background:#fff;border:1.5px solid #f0dded;border-radius:10px;margin-bottom:12px;overflow:hidden}
  .history-header{background:#fdf0f6;padding:8px 16px;border-bottom:1px solid #f0dded;display:flex;justify-content:space-between}
  .history-date{color:#c05080;font-weight:bold;font-size:13px}
  .history-sub{color:#b090a8;font-size:12px}
  .history-grid{padding:10px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .history-item{display:flex;justify-content:space-between;font-size:13px}
  .sync-bar{border-radius:8px;padding:8px 14px;margin-bottom:16px;font-size:12px;display:flex;align-items:center;gap:8px}
  .sync-bar.info{background:#f0f8ff;border:1px solid #c0d8f0;color:#4080b0}
  .sync-bar.error{background:#fff0f0;border:1px solid #f0c0c0;color:#c04040}
  .sync-bar.success{background:#f0fff4;border:1px solid #b0e0c0;color:#307050}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid #c0d8f0;border-top-color:#4080b0;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="landing">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <div class="landing-content">
    <div style="font-size:70px;margin-bottom:6px;filter:drop-shadow(0 4px 8px #c0508030)">🀄</div>
    <h1 style="font-size:34px;color:#c05080;margin-bottom:4px;letter-spacing:1px">Mahjong Day</h1>
    <div style="font-size:11px;color:#b080a0;letter-spacing:4px;text-transform:uppercase;margin-bottom:36px">Score Keeper & Season Tracker</div>
    <div class="emoji-row" id="avatarRow"></div>
    <div class="stat-box" id="statBox">Loading season data…</div>
    <div style="display:flex;flex-direction:column">
      <button class="btn-primary" onclick="goTo('today')">🎴 Score Today's Games</button>
      <button class="btn-secondary" onclick="goTo('season')">🏆 Season Totals</button>
    </div>
  </div>
</div>

<div id="navbar">
  <div class="nav-inner">
    <button class="nav-logo" onclick="goTo('landing')">
      <div class="nav-title">🀄 Mahjong Day</div>
      <div class="nav-sub">Score Keeper</div>
    </button>
    <div class="nav-tabs">
      <button class="nav-tab" id="tab-today" onclick="goTo('today')">🎴 Today</button>
      <button class="nav-tab" id="tab-season" onclick="goTo('season')">🏆 Season</button>
    </div>
  </div>
</div>

<div class="page" id="page-today">
  <div id="syncBarToday" class="sync-bar info" style="display:none"></div>
  <div class="date-row">
    <span class="date-label">Game Date</span>
    <input type="date" id="gameDate"/>
  </div>
  <div id="gamesContainer"></div>
  <button class="add-game-btn" onclick="addGame()">+ Add Another Game</button>
  <div class="totals-box">
    <div class="totals-title" id="totalsTitle">📊 DAY TOTALS</div>
    <div class="totals-grid" id="totalsGrid"></div>
  </div>
  <div class="save-row">
    <button class="save-btn" id="saveBtn" onclick="saveDay()">💾 Save Day to Season</button>
    <span class="save-msg" id="saveMsg"></span>
  </div>
</div>

<div class="page" id="page-season">
  <div id="syncBarSeason" class="sync-bar info" style="display:none"></div>
  <div class="season-header">
    <div>
      <div class="season-title">🏆 Season Standings</div>
      <div class="season-sub" id="seasonSub"></div>
    </div>
    <button class="clear-btn" onclick="clearSeason()">🗑 Clear Season</button>
  </div>
  <div class="leaderboard">
    <div class="section-label">Total Points Ranking</div>
    <div id="leaderboardRows"></div>
  </div>
  <div class="section-label" style="margin-bottom:12px">Winning Hands by Player</div>
  <div class="hands-grid" id="handsGrid"></div>
  <div id="historySection"></div>
</div>

<script>
// ── Config — UPDATE THIS after deploying to Railway ────────────────────────
// Before deploying, leave as empty string. After Railway gives you a URL,
// update this to e.g. "https://mahjong-day.up.railway.app"
const API_BASE = "https://mahjong-score-keeping-production-b097.up.railway.app";

const PLAYERS = ["Melissa","Ana","Leigh","Natalie","Angela","Pato"];
const EMOJI   = {Melissa:"🌸",Ana:"🌷",Leigh:"🍃",Natalie:"🌼",Angela:"💙",Pato:"🍊"};
const PASTEL  = {
  Melissa:{bg:"#ffd6d6",accent:"#e08080",text:"#7a2a2a"},
  Ana:    {bg:"#e8d6f7",accent:"#b07ad4",text:"#4a1f6a"},
  Leigh:  {bg:"#d6f0e0",accent:"#70b88a",text:"#1e5c38"},
  Natalie:{bg:"#fff3cc",accent:"#d4a830",text:"#6a4e00"},
  Angela: {bg:"#d6eaff",accent:"#6aaae0",text:"#1a3f6a"},
  Pato:   {bg:"#ffe0cc",accent:"#e09060",text:"#6a2e00"},
};

let state = { days: [] };
let currentDay = newDay();

function newDay()  { return { date: today(), games: [newGame()] }; }
function newGame() { const g={isWallGame:false}; PLAYERS.forEach(p=>g[p]={points:"",hand:""}); return g; }
function today()   { return new Date().toISOString().split("T")[0]; }

// ── API calls ──────────────────────────────────────────────────────────────
async function apiLoad() {
  const r = await fetch(`${API_BASE}/api/scores`);
  if (!r.ok) throw new Error("Load failed");
  return r.json();
}
async function apiSave(data) {
  const r = await fetch(`${API_BASE}/api/scores`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error("Save failed");
}

// ── Sync helpers ───────────────────────────────────────────────────────────
function showSync(page, type, msg, spinner=false) {
  const el = document.getElementById("syncBar" + page[0].toUpperCase() + page.slice(1));
  if (!el) return;
  el.style.display = "flex";
  el.className = `sync-bar ${type}`;
  el.innerHTML = (spinner ? `<span class="spinner"></span>` : "") + `<span>${msg}</span>`;
}
function hideSync(page) {
  const el = document.getElementById("syncBar" + page[0].toUpperCase() + page.slice(1));
  if (el) el.style.display = "none";
}

async function syncLoad(page) {
  showSync(page, "info", "Syncing with cloud…", true);
  try {
    state = await apiLoad();
    hideSync(page);
  } catch {
    showSync(page, "error", "⚠️ Could not reach server — check your connection");
  }
}

// ── Season compute ─────────────────────────────────────────────────────────
function computeSeason() {
  const t={};
  PLAYERS.forEach(p=>t[p]={points:0,hands:{},wins:0});
  (state.days||[]).forEach(day=>{
    (day.games||[]).forEach(game=>{
      PLAYERS.forEach(p=>{
        const pts=parseInt(game[p]?.points)||0, hand=game[p]?.hand?.trim();
        t[p].points+=pts; if(pts>0)t[p].wins++;
        if(hand) t[p].hands[hand]=(t[p].hands[hand]||0)+1;
      });
    });
  });
  return t;
}

// ── Navigation ─────────────────────────────────────────────────────────────
function goTo(view) {
  document.getElementById("landing").style.display = view==="landing"?"flex":"none";
  document.getElementById("navbar").style.display  = view==="landing"?"none":"block";
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  if (view!=="landing") {
    document.getElementById("page-"+view).classList.add("active");
    const tab=document.getElementById("tab-"+view); if(tab)tab.classList.add("active");
  }
  if (view==="today")  { syncLoad("today").then(renderToday); }
  if (view==="season") { syncLoad("season").then(renderSeason); }
  if (view==="landing") renderLanding();
}

// ── Landing ────────────────────────────────────────────────────────────────
function renderLanding() {
  document.getElementById("avatarRow").innerHTML = PLAYERS.map(p=>`
    <div class="avatar" title="${p}" style="background:${PASTEL[p].bg};border-color:${PASTEL[p].accent};box-shadow:0 3px 10px ${PASTEL[p].accent}40">${EMOJI[p]}</div>`).join("");
  const total=(state.days||[]).reduce((s,d)=>s+(d.games?.length||0),0);
  document.getElementById("statBox").textContent =
    state.days.length===0
      ? "No games yet — start your season! 🎉"
      : `${state.days.length} game day${state.days.length!==1?"s":""} · ${total} game${total!==1?"s":""} played`;
}

// ── Today ──────────────────────────────────────────────────────────────────
function renderToday() {
  document.getElementById("gameDate").value = currentDay.date;
  document.getElementById("gameDate").onchange = e=>{ currentDay.date=e.target.value; updateTotals(); };
  renderGames(); updateTotals();
}

function renderGames() {
  document.getElementById("gamesContainer").innerHTML = currentDay.games.map((game,gi)=>`
    <div class="game-card">
      <div class="game-header">
        <div class="wall-toggle-row">
          <span class="game-title">GAME ${gi+1}</span>
          <div class="toggle-wrap" onclick="toggleWall(${gi})">
            <div class="toggle-track ${game.isWallGame?"on":""}"><div class="toggle-thumb"></div></div>
            <span class="toggle-label" style="${game.isWallGame?"color:#c05080;font-weight:bold":""}">${game.isWallGame?"🧱 Wall Game":"Wall Game"}</span>
          </div>
        </div>
        ${currentDay.games.length>1?`<button class="remove-btn" onclick="removeGame(${gi})">✕</button>`:""}
      </div>
      ${game.isWallGame?`<div class="wall-banner">🧱 Wall game — no winner. Enter any penalties or leave all blank.</div>`:""}
      <div class="players-grid">
        ${PLAYERS.map(p=>`
          <div class="player-card" style="background:${PASTEL[p].bg};border-color:${PASTEL[p].accent}55">
            <div class="player-name-row"><span style="font-size:16px">${EMOJI[p]}</span><span class="player-name" style="color:${PASTEL[p].text}">${p}</span></div>
            <input class="player-input" type="number" placeholder="Points" value="${game[p]?.points||""}" oninput="updateField(${gi},'${p}','points',this.value)"/>
            <input class="hand-input" type="text" placeholder="${game.isWallGame?"Penalty / notes":"Winning hand"}" value="${game[p]?.hand||""}" style="color:${PASTEL[p].accent}" oninput="updateField(${gi},'${p}','hand',this.value)"/>
          </div>`).join("")}
      </div>
    </div>`).join("");
}

function toggleWall(gi) { currentDay.games[gi].isWallGame=!currentDay.games[gi].isWallGame; renderGames(); updateTotals(); }
function updateField(gi,p,field,val) { currentDay.games[gi][p][field]=val; updateTotals(); }
function addGame() { currentDay.games.push(newGame()); renderGames(); updateTotals(); }
function removeGame(gi) { currentDay.games.splice(gi,1); renderGames(); updateTotals(); }

function getDayTotals() {
  const t={}; PLAYERS.forEach(p=>t[p]=0);
  currentDay.games.forEach(g=>PLAYERS.forEach(p=>{t[p]+=parseInt(g[p]?.points)||0;}));
  return t;
}
function updateTotals() {
  const t=getDayTotals();
  document.getElementById("totalsTitle").textContent=`📊 DAY TOTALS — ${currentDay.date}`;
  document.getElementById("totalsGrid").innerHTML=PLAYERS.map(p=>`
    <div class="total-item" style="background:${PASTEL[p].bg}">
      <span style="color:${PASTEL[p].text};font-weight:bold;font-size:13px">${p}</span>
      <span style="color:${PASTEL[p].text};font-weight:bold;font-size:16px">${t[p]>0?"+":""}${t[p]}</span>
    </div>`).join("");
}

async function saveDay() {
  const btn=document.getElementById("saveBtn"), msg=document.getElementById("saveMsg");
  btn.disabled=true; btn.textContent="Saving…"; btn.style.background="#dda0b8";
  const snapshot = JSON.parse(JSON.stringify(currentDay));
  state.days.push(snapshot);
  try {
    await apiSave(state);
    msg.textContent="☁️ Saved! ✓"; msg.style.color="#307050";
    currentDay=newDay(); renderToday(); renderLanding();
  } catch {
    state.days.pop();
    msg.textContent="⚠️ Save failed — try again"; msg.style.color="#c04040";
  }
  btn.disabled=false; btn.style.background="linear-gradient(135deg,#f0a0c0,#d070a0)"; btn.textContent="💾 Save Day to Season";
  setTimeout(()=>msg.textContent="",3000);
}

// ── Season ─────────────────────────────────────────────────────────────────
function renderSeason() {
  const season=computeSeason();
  const total=(state.days||[]).reduce((s,d)=>s+(d.games?.length||0),0);
  document.getElementById("seasonSub").textContent=`${state.days.length} game days · ${total} games total`;

  const sorted=[...PLAYERS].sort((a,b)=>(season[b].points||0)-(season[a].points||0));
  const maxPts=Math.max(...PLAYERS.map(p=>season[p].points||0),1);
  const medals=["🥇","🥈","🥉"];
  document.getElementById("leaderboardRows").innerHTML=sorted.map((p,rank)=>{
    const pts=season[p].points||0, pct=Math.max((pts/maxPts)*100,0);
    return `<div class="lb-row">
      <span class="lb-rank">${rank<3?medals[rank]:`<span style="color:#c0a0b0;font-size:13px">${rank+1}.</span>`}</span>
      <span class="lb-name" style="color:${PASTEL[p].text}">${EMOJI[p]} ${p}</span>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:linear-gradient(90deg,${PASTEL[p].accent}88,${PASTEL[p].accent})"></div></div>
      <span class="lb-pts" style="color:${PASTEL[p].text}">${pts}</span>
      <span class="lb-wins">${season[p].wins||0}W</span>
    </div>`;
  }).join("");

  document.getElementById("handsGrid").innerHTML=PLAYERS.map(p=>{
    const entries=Object.entries(season[p].hands||{}).sort((a,b)=>b[1]-a[1]);
    return `<div class="hand-card" style="background:${PASTEL[p].bg};border-color:${PASTEL[p].accent}55">
      <div class="hand-card-header">
        <span style="font-size:20px">${EMOJI[p]}</span>
        <span style="color:${PASTEL[p].text};font-weight:bold;font-size:14px">${p}</span>
        <span class="hand-card-stat" style="color:${PASTEL[p].accent}">${season[p].points||0} pts · ${season[p].wins||0}W</span>
      </div>
      ${entries.length===0
        ?`<div class="hand-none" style="color:${PASTEL[p].text}80">No hands recorded yet</div>`
        :entries.map(([h,c])=>`<div class="hand-row" style="border-color:${PASTEL[p].accent}30"><span style="color:${PASTEL[p].text};font-style:italic">${h}</span><span style="color:${PASTEL[p].accent};font-weight:bold">×${c}</span></div>`).join("")}
    </div>`;
  }).join("");

  const hsec=document.getElementById("historySection");
  if (!state.days.length){hsec.innerHTML="";return;}
  hsec.innerHTML=`<div class="section-label" style="margin-bottom:12px">Game Day History</div>`+
    [...state.days].reverse().map((day,di)=>{
      const wallCount=day.games?.filter(g=>g.isWallGame).length||0;
      const gameCount=day.games?.length||0;
      const wallFlag=wallCount>0?` · 🧱 ${wallCount} wall${wallCount!==1?"s":""}` :"";
      const uid=`day-${di}`;
      return `<div class="history-card">
        <div class="history-header" onclick="toggleDay('${uid}')" style="cursor:pointer">
          <span class="history-date">📅 ${day.date}</span>
          <span class="history-sub">${gameCount} game${gameCount!==1?"s":""}${wallFlag} <span id="arrow-${uid}" style="margin-left:6px">▼</span></span>
        </div>
        <div class="history-grid">
          ${PLAYERS.map(p=>{
            const t=(day.games||[]).reduce((s,g)=>s+(parseInt(g[p]?.points)||0),0);
            return `<div class="history-item"><span style="color:${PASTEL[p].text};font-weight:bold">${p}</span><span style="color:${t>0?PASTEL[p].accent:"#c0a0b0"};font-weight:bold">${t>0?"+":""}${t}</span></div>`;
          }).join("")}
        </div>
        <div id="${uid}" style="display:none;border-top:1px solid #f0dded;padding:12px 16px">
          ${(day.games||[]).map((game,gi)=>`
            <div style="margin-bottom:${gi<day.games.length-1?'14px':'0'}">
              <div style="font-size:11px;font-weight:bold;color:#c05080;letter-spacing:2px;margin-bottom:8px">
                GAME ${gi+1}${game.isWallGame?' 🧱 WALL GAME':''}
              </div>
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
                ${PLAYERS.map(p=>{
                  const pts=parseInt(game[p]?.points)||0;
                  const hand=game[p]?.hand?.trim();
                  return `<div style="background:${PASTEL[p].bg};border-radius:8px;padding:6px 10px">
                    <div style="font-weight:bold;font-size:12px;color:${PASTEL[p].text}">${EMOJI[p]} ${p}</div>
                    <div style="font-size:14px;font-weight:bold;color:${pts>0?PASTEL[p].accent:'#c0a0b0'}">${pts>0?'+':''}${pts}</div>
                    ${hand?`<div style="font-size:11px;font-style:italic;color:${PASTEL[p].accent}">${hand}</div>`:''}
                  </div>`;
                }).join('')}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    }).join("");
}

function toggleDay(uid) {
  const el=document.getElementById(uid);
  const arrow=document.getElementById('arrow-'+uid);
  if (!el) return;
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  arrow.textContent=open?'▲':'▼';
}

async function clearSeason() {
  if (!confirm("Clear ALL season data? This cannot be undone.")) return;
  state={days:[]};
  await apiSave(state);
  renderSeason(); renderLanding();
}

// ── Init ───────────────────────────────────────────────────────────────────
renderLanding();
apiLoad().then(data => { state=data; renderLanding(); }).catch(()=>{});
</script>
</body>
</html>
